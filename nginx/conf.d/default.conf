# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name kangying.com.tw www.kangying.com.tw;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name kangying.com.tw www.kangying.com.tw;

    # --- SSL Configuration ---
    ssl_certificate /etc/letsencrypt/live/kangying.com.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kangying.com.tw/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Rate Limits ---

    # Auth endpoint: strict rate limit (5 per minute)
    location /api/upload/auth {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload endpoints: moderate rate limit
    location /api/upload/ {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;

        # Optional: IP whitelist for admin area
        # Uncomment and modify to restrict admin access
        # allow 192.168.1.0/24;  # Company LAN
        # allow YOUR_PUBLIC_IP;   # Specific public IP
        # deny all;

        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload admin page
    location /upload {
        limit_req zone=general burst=10 nodelay;

        # Optional: IP whitelist for admin page
        # allow 192.168.1.0/24;
        # deny all;

        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploaded files directly from data volume (faster than Node.js)
    location /api/uploads/ {
        alias /data/uploads/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block direct access to data directories
    location /data/ {
        deny all;
        return 404;
    }

    # Debug endpoint: block in production
    location /api/debug/ {
        deny all;
        return 404;
    }

    # General rate limit for all other requests
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://nextjs:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /logo.png {
        proxy_pass http://nextjs:3000;
        expires 30d;
        add_header Cache-Control "public";
    }
}
