version: "3.8"

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kangying-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - app-data:/data
    networks:
      - web
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: kangying-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - app-data:/data:ro
    depends_on:
      - nextjs
    networks:
      - web

  certbot:
    image: certbot/certbot
    container_name: kangying-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

volumes:
  app-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}
  certbot-etc:
  certbot-var:

networks:
  web:
    driver: bridge
